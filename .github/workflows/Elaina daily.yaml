name: 'Elaina daily'

on:
    schedule:
        - cron: '10 16 * * *' # 00:10 CST Everyday
    workflow_dispatch:
        inputs:
            task:
                description: '选择任务'
                type: choice
                required: true
                options:
                    - cleanSandbox

env:
    API_USER_AGENT: ${{ secrets.API_USER_AGENT }}
    MH_BOT: ${{ secrets.MH_BOT }}

jobs:
    cleanSandbox:
        if: |
            github.event.schedule == '10 16 * * *' ||
            github.event.inputs.task == 'cleanSandbox'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - name: Set Node Version
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run Script
              run: npx tsx src/bot/elaina/cleanSandbox.ts
