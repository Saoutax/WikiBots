name: 'UEW daily'

on:
    schedule:
        - cron: '30 16 * * *' # 00:30 CST Everyday
        - cron: '30 16 * * 2' # 00:30 CST Tuesday
        - cron: '30 20 * * *' # 04:30 CST Everyday
    workflow_dispatch:
        inputs:
            task:
                description: '选择任务'
                type: choice
                required: true
                options:
                    - cleanSandbox
                    - invisibleCharacter
                    - countdown

env:
    API_USER_AGENT: ${{ secrets.API_USER_AGENT }}
    UEW_CF: ${{ secrets.UEW_CF }}
    UEW_BOT: ${{ secrets.UEW_BOT }}
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
    cleanSandbox:
        if: |
            github.event.schedule == '30 20 * * *' ||
            github.event.inputs.task == 'cleanSandbox'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Bot
              uses: ./.github/actions/setup-bot
            - name: Run Script
              run: npx tsx src/bot/uew/cleanSandbox.ts

    invisibleCharacter:
        if: |
            github.event.schedule == '30 16 * * 2' ||
            github.event.inputs.task == 'invisibleCharacter'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Bot
              uses: ./.github/actions/setup-bot
              with:
                  node-version: '20.x'
            - name: Run Script
              run: npx tsx src/bot/uew/invisibleCharacter.ts

    countdown:
        if: |
            github.event.schedule == '30 16 * * *' ||
            github.event.inputs.task == 'countdown'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Bot
              uses: ./.github/actions/setup-bot
              with:
                  node-version: '20.x'
            - name: Run Script
              run: npx tsx src/bot/uew/countdown.ts
