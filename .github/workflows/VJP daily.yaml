name: 'VJP daily'

on:
    schedule:
        - cron: '10 16 * * *' # 00:10 CST Everyday
        - cron: '30 20 * * *' # 04:30 CST Everyday
        - cron: '30 19 * * 2' # 03:30 CST Wednesday
    workflow_dispatch:
        inputs:
            task:
                description: '选择任务'
                type: choice
                required: true
                options:
                    - cleanSandbox
                    - invisibleCharacter
                    - activeCount
                    - mostTranscludedPages
                    - editCount
                    - archiveThread
                    - siteStatistics
                    - doubleRedirects

env:
    API_USER_AGENT: ${{ secrets.API_USER_AGENT }}
    VJP_BOT: ${{ secrets.VJP_BOT }}

jobs:
    cleanSandbox:
        if: |
            github.event.schedule == '30 20 * * *' ||
            github.event.inputs.task == 'cleanSandbox'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - name: Set Node Version
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run Script
              run: npx tsx src/bot/vjp/cleanSandbox.ts

    invisibleCharacter:
        if: |
            # github.event.schedule == '10 16 * * *' ||
            github.event.inputs.task == 'invisibleCharacter'
