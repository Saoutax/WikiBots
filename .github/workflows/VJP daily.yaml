name: 'VJP daily'

on:
    schedule:
        - cron: '10 16 * * *' # 00:10 CST Everyday
        - cron: '10 17 * * *' # 01:10 CST Everyday
        - cron: '10 17 * * 1' # 01:10 CST Monday
        - cron: '10 18 * * *' # 02:10 CST Everyday
        - cron: '30 20 * * *' # 04:30 CST Everyday
        - cron: '30 19 * * 2' # 03:30 CST Wednesday
    workflow_dispatch:
        inputs:
            task:
                description: '选择任务'
                type: choice
                required: true
                options:
                    - cleanSandbox
                    - invisibleCharacter
                    - activeCount
                    - mostTranscludedPages
                    - editCount
                    - archiveThread
                    - siteStatistics
                    - doubleRedirects
                    - fixRedirects
                    - nullEdit

env:
    API_USER_AGENT: ${{ secrets.API_USER_AGENT }}
    VJP_BOT: ${{ secrets.VJP_BOT }}
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
    cleanSandbox:
        if: |
            github.event.schedule == '30 20 * * *' ||
            github.event.inputs.task == 'cleanSandbox'
        runs-on: ubuntu-latest
        steps:
            - uses: ./.github/actions/setup-bot
            - name: Run Script
              run: npx tsx src/bot/vjp/cleanSandbox.ts

    invisibleCharacter:
        if: |
            github.event.schedule == '10 17 * * 1' ||
            github.event.inputs.task == 'invisibleCharacter'
        runs-on: ubuntu-latest
        steps:
            - uses: ./.github/actions/setup-bot
            - name: Run Script
              run: npx tsx src/bot/vjp/invisibleCharacter.ts

    activeCount:
        if: |
            github.event.schedule == '30 20 * * *' ||
            github.event.inputs.task == 'activeCount'
        runs-on: ubuntu-latest
        steps:
            - uses: ./.github/actions/setup-bot
            - name: Run Script
              run: npx tsx src/bot/vjp/activeCount.ts

    mostTranscludedPages:
        if: |
            github.event.schedule == '30 19 * * 2' ||
            github.event.inputs.task == 'mostTranscludedPages'
        runs-on: ubuntu-latest
        steps:
            - uses: ./.github/actions/setup-bot
            - name: Run Script
              run: npx tsx src/bot/vjp/mostTranscludedPages.ts

    editCount:
        if: |
            github.event.schedule == '30 19 * * 2' ||
            github.event.inputs.task == 'editCount'
        runs-on: ubuntu-latest
        steps:
            - uses: ./.github/actions/setup-bot
            - name: Run Script
              run: npx tsx src/bot/vjp/editCount.ts

    archiveThread:
        if: |
            github.event.schedule == '10 16 * * *' ||
            github.event.inputs.task == 'archiveThread'
        runs-on: ubuntu-latest
        steps:
            - uses: ./.github/actions/setup-bot
            - name: Run Script
              run: npx tsx src/bot/vjp/archiveThread.ts

    siteStatistics:
        if: |
            github.event.schedule == '10 16 * * *' ||
            github.event.inputs.task == 'siteStatistics'
        runs-on: ubuntu-latest
        steps:
            - uses: ./.github/actions/setup-bot
            - name: Run Script
              run: npx tsx src/bot/vjp/siteStatistics.ts

    doubleRedirects:
        if: |
            github.event.schedule == '30 20 * * *' ||
            github.event.inputs.task == 'doubleRedirects'
        runs-on: ubuntu-latest
        steps:
            - uses: ./.github/actions/setup-bot
            - name: Run Script
              run: npx tsx src/bot/vjp/doubleRedirects.ts

    fixRedirects:
        if: |
            github.event.schedule == '10 17 * * *' ||
            github.event.inputs.task == 'fixRedirects'
        runs-on: ubuntu-latest
        steps:
            - uses: ./.github/actions/setup-bot
            - name: Run Script
              run: npx tsx src/bot/vjp/fixRedirects.ts

    nullEdit:
        if: |
            github.event.schedule == '10 18 * * *' ||
            github.event.inputs.task == 'nullEdit'
        runs-on: ubuntu-latest
        steps:
            - uses: ./.github/actions/setup-bot
            - name: Run Script
              run: npx tsx src/bot/vjp/nullEdit.ts
