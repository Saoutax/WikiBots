name: 'Repository'

on:
    schedule:
        - cron: '00 18 * * *' # 02:00 CST Everyday
    workflow_dispatch:
        inputs:
            task:
                description: 'Choose task'
                type: choice
                required: true
                options:
                    - removeOutdateRecord

env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
    removeOutdateRecord:
        if: |
            github.event.schedule == '00 18 * * *' ||
            github.event.inputs.task == 'removeOutdateRecord'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - name: Set Node Version
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run Script
              run: npx tsx scripts/removeOutdateRecord.ts
